<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f0f3f7;
      padding: 36pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 8pt; font-weight: 600; color: #ffffff; background: #2E5880; padding: 3pt 8pt; border-radius: 3pt; letter-spacing: 0.06em; text-transform: uppercase;">Production</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #1a2a3d; letter-spacing: -0.02em;">The Full Workflow</h2>
    </div>
    <p style="font-size: 9pt; color: #a0aab8;">24</p>
  </div>

  <!-- Horizontal pipeline -->
  <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
    <div style="display: flex; align-items: center; gap: 10pt; width: 100%;">
      <!-- Stage 1 -->
      <div style="flex: 1; background: #ffffff; border-top: 3pt solid #38804A; border-radius: 6pt; padding: 18pt 16pt; text-align: center;">
        <p style="font-size: 22pt; margin-bottom: 10pt;">💻</p>
        <h3 style="font-size: 12pt; font-weight: 600; color: #1a2a3d; margin-bottom: 6pt;">Code with AI</h3>
        <p style="font-size: 10pt; color: #5a6b80; line-height: 1.5;">Agent implements the feature</p>
      </div>

      <p style="font-size: 16pt; color: #d0d8e4; flex-shrink: 0;">→</p>

      <!-- Stage 2 -->
      <div style="flex: 1; background: #ffffff; border-top: 3pt solid #2E5880; border-radius: 6pt; padding: 18pt 16pt; text-align: center;">
        <p style="font-size: 22pt; margin-bottom: 10pt;">🔀</p>
        <h3 style="font-size: 12pt; font-weight: 600; color: #1a2a3d; margin-bottom: 6pt;">AI Opens PR</h3>
        <p style="font-size: 10pt; color: #5a6b80; line-height: 1.5;">PR created on first push</p>
      </div>

      <p style="font-size: 16pt; color: #d0d8e4; flex-shrink: 0;">→</p>

      <!-- Stage 3 -->
      <div style="flex: 1; background: #ffffff; border-top: 3pt solid #B89A3E; border-radius: 6pt; padding: 18pt 16pt; text-align: center;">
        <p style="font-size: 22pt; margin-bottom: 10pt;">🔍</p>
        <h3 style="font-size: 12pt; font-weight: 600; color: #1a2a3d; margin-bottom: 6pt;">AI Reviews</h3>
        <p style="font-size: 10pt; color: #5a6b80; line-height: 1.5;">Automated code review</p>
      </div>

      <p style="font-size: 16pt; color: #d0d8e4; flex-shrink: 0;">→</p>

      <!-- Stage 4 -->
      <div style="flex: 1; background: #ffffff; border-top: 3pt solid #B8453E; border-radius: 6pt; padding: 18pt 16pt; text-align: center;">
        <p style="font-size: 22pt; margin-bottom: 10pt;">🐛</p>
        <h3 style="font-size: 12pt; font-weight: 600; color: #1a2a3d; margin-bottom: 6pt;">Debug with AI</h3>
        <p style="font-size: 10pt; color: #5a6b80; line-height: 1.5;">Sentry + MCP for fixes</p>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div style="margin-top: 20pt; text-align: center;">
    <p style="font-size: 13pt; font-weight: 500; color: #1a2a3d;">This is not hypothetical — this is how teams are working <span style="color: #38804A; font-weight: 600;">today</span>.</p>
  </div>
</body>
</html>
