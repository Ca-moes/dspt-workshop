<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f0f3f7;
      padding: 36pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 8pt; font-weight: 600; color: #ffffff; background: #38804A; padding: 3pt 8pt; border-radius: 3pt; letter-spacing: 0.06em; text-transform: uppercase;">Demo</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #1a2a3d; letter-spacing: -0.02em;">The App</h2>
    </div>
    <p style="font-size: 9pt; color: #a0aab8;">20</p>
  </div>

  <p style="font-size: 13pt; color: #5a6b80; margin-bottom: 20pt;">Submit and vote on the worst (and best) git commit messages ever written.</p>

  <!-- Commit message cards -->
  <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14pt;">
    <div style="background: #ffffff; border: 1pt solid #d0d8e4; border-radius: 8pt; padding: 18pt 20pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 15pt; color: #1a2a3d; font-style: italic; line-height: 1.4;">"fixed it"</p>
      <p style="font-size: 9pt; color: #5a6b80; margin-top: 12pt;">47 files changed</p>
    </div>

    <div style="background: #ffffff; border: 1pt solid #d0d8e4; border-radius: 8pt; padding: 18pt 20pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 15pt; color: #1a2a3d; font-style: italic; line-height: 1.4;">"please work"</p>
      <p style="font-size: 9pt; color: #5a6b80; margin-top: 12pt;">committed at 4:12am</p>
    </div>

    <div style="background: #ffffff; border: 1pt solid #d0d8e4; border-radius: 8pt; padding: 18pt 20pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 13pt; color: #1a2a3d; font-style: italic; line-height: 1.4;">"I don't know why this works but don't touch it"</p>
      <p style="font-size: 9pt; color: #5a6b80; margin-top: 12pt;">3 upvotes</p>
    </div>

    <div style="background: #ffffff; border: 1pt solid #d0d8e4; border-radius: 8pt; padding: 18pt 20pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 14pt; color: #1a2a3d; font-style: italic; line-height: 1.4;">"final fix v3 FINAL (real)"</p>
      <p style="font-size: 9pt; color: #5a6b80; margin-top: 12pt;">12 upvotes</p>
    </div>
  </div>
</body>
</html>
