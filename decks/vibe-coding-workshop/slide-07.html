<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f0f3f7;
      padding: 36pt 48pt;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div style="display: flex; gap: 32pt; align-items: center; width: 100%;">
    <!-- Left: the consultant visual -->
    <div style="width: 220pt; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 12pt;">
      <div style="width: 140pt; height: 140pt; background: #ffffff; border: 2pt solid #2E5880; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 56pt;">🧑‍💼</p>
      </div>
      <p style="font-size: 12pt; font-weight: 600; color: #2E5880; text-align: center;">Brilliant consultant</p>
      <p style="font-size: 10pt; color: #5a6b80; text-align: center;">Knows every language, framework, and pattern</p>
    </div>

    <!-- Right: the context gap -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 16pt;">
      <div style="background: #ffffff; border-left: 3pt solid #2E5880; border-radius: 0 8pt 8pt 0; padding: 18pt 22pt;">
        <p style="font-size: 16pt; font-weight: 400; color: #1a2a3d; line-height: 1.5; font-style: italic;">"The context window is the AI's short-term memory. Everything it knows, right now, is in this window."</p>
      </div>

      <div style="display: flex; gap: 10pt; align-items: center;">
        <div style="flex: 1; background: #f0d8d6; border-radius: 6pt; padding: 14pt 16pt; text-align: center;">
          <p style="font-size: 11pt; font-weight: 600; color: #B8453E;">Without context</p>
          <p style="font-size: 10pt; color: #B8453E; margin-top: 4pt;">Every conversation starts from zero</p>
        </div>
        <p style="font-size: 18pt; color: #a0aab8;">→</p>
        <div style="flex: 1; background: #d8eadd; border-radius: 6pt; padding: 14pt 16pt; text-align: center;">
          <p style="font-size: 11pt; font-weight: 600; color: #38804A;">With context</p>
          <p style="font-size: 10pt; color: #38804A; margin-top: 4pt;">Feels like a superpower</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
