<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f0f3f7;
      padding: 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      bottom: -80pt;
      right: -80pt;
      width: 300pt;
      height: 300pt;
      background: radial-gradient(circle, rgba(56,128,74,0.08) 0%, rgba(46,88,128,0.04) 40%, transparent 65%);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Section label -->
  <div style="position: relative; z-index: 1;">
    <p style="font-size: 9pt; font-weight: 600; color: #38804A; letter-spacing: 0.12em; text-transform: uppercase;">Section D — Live Demo</p>
  </div>

  <!-- Main title -->
  <div style="position: relative; z-index: 1;">
    <h1 style="font-size: 42pt; font-weight: 600; color: #1a2a3d; letter-spacing: -0.03em; line-height: 1.15;">
      Commit Message<br>Hall of Fame
    </h1>
    <p style="font-size: 14pt; color: #5a6b80; margin-top: 16pt; max-width: 420pt; line-height: 1.6;">
      A museum of developer desperation, creativity, and 3am honesty.
    </p>
  </div>

  <!-- Handoff note -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 1;">
    <p style="font-size: 10pt; color: #2E5880;">Pedro takes over</p>
    <p style="font-size: 10pt; color: #a0aab8;">19</p>
  </div>
</body>
</html>
