<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f0f3f7;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: -60pt;
      right: -60pt;
      width: 280pt;
      height: 280pt;
      background: radial-gradient(circle, rgba(56,128,74,0.08) 0%, rgba(46,88,128,0.04) 50%, transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -40pt;
      left: -40pt;
      width: 200pt;
      height: 200pt;
      background: radial-gradient(circle, rgba(46,88,128,0.06) 0%, transparent 60%);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Logos -->
  <div style="display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1;">
    <img src="./assets/promptly.svg" alt="Promptly" style="height: 22pt;">
    <img src="./assets/dspt.jpg" alt="DSPT 2026" style="height: 28pt; border-radius: 3pt;">
  </div>

  <!-- Main title -->
  <div style="position: relative; z-index: 1;">
    <h1 style="font-size: 64pt; font-weight: 700; color: #1a2a3d; letter-spacing: -0.03em; line-height: 1.2;">
      Vibe Coding
    </h1>
    <p style="font-size: 18pt; font-weight: 400; color: #5a6b80; margin-top: 12pt; letter-spacing: -0.01em;">
      From Idea to Production with AI Agents
    </p>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 1;">
    <div style="display: flex; gap: 48pt;">
      <div>
        <p style="font-size: 8pt; font-weight: 600; color: #a0aab8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4pt;">Presenters</p>
        <p style="font-size: 12pt; font-weight: 500; color: #1a2a3d;">Dani &amp; Pedro</p>
      </div>
      <div>
        <p style="font-size: 8pt; font-weight: 600; color: #a0aab8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4pt;">Event</p>
        <p style="font-size: 12pt; font-weight: 500; color: #1a2a3d;">DSPT 2026</p>
      </div>
    </div>
    <p style="font-size: 9pt; color: #a0aab8;">April 2026</p>
  </div>
</body>
</html>
